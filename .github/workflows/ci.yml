name: EquityGuard CI

on:
  push:
    branches: [main, feature/equityguard-pro]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run guardrail tests
        run: pytest tests/test_guardrails.py -v

      - name: Run technical indicator tests
        run: pytest tests/test_technicals.py -v

      - name: Run evaluation tests
        run: pytest tests/test_evaluation.py -v